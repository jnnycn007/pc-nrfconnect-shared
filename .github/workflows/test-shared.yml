name: Test shared

on:
    workflow_dispatch:
    pull_request:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: 'npm'
            - run: npm ci
            - run: npm run check
            - run: npx tsx scripts/check-versions.ts
            - run: npm test
            - run: npm pack
